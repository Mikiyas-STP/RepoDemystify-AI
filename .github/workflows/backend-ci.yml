name: Backend CI

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  build:

    name: Build Spring Boot Backend

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4

        with:
          java-version: '21'
          distribution: 'temurin'


      - name: Build with Maven

        working-directory: backend

        run: mvn clean test